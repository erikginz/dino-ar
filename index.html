<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: transparent;
    }

    button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>

<body>

<model-viewer
  id="dino"
  src="dino.glb"
  ios-src="dino.usdz"
  ar
  ar-modes="scene-viewer quick-look webxr"
  ar-placement="floor"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  environment-image="neutral"
  loading="eager">

  <button slot="ar-button">
    View in AR
  </button>

</model-viewer>

<script>
window.addEventListener("load", () => {
  const mv = document.getElementById("dino");

  // попытка автозапуска AR (работает только частично на Android)
  setTimeout(() => {
    mv.activateAR?.();
  }, 800);
});
</script>

</body>
</html>
