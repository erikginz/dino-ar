<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; }
    model-viewer { width: 100vw; height: 100vh; }
  </style>
</head>

<body>

<model-viewer
src="dino.glb"
ios-src="dino.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
shadow-intensity="1">

<button slot="ar-button">
View in AR
</button>

</model-viewer>

</body>
</html>
